# ============================================================
# Support AI  –  Docker Compose (full stack)
#
# Usage:
#   cp .env.example .env        # fill in OPENAI_API_KEY
#   docker-compose up --build   # first run
#   docker-compose up           # subsequent runs
#
# Data persists across restarts via the pgdata volume.
# To wipe and re-seed:  docker-compose down -v && docker-compose up
# ============================================================

services:
  # ----------------------------------------------------------
  # Postgres – data store (only mock_api talks to this)
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_pass
      POSTGRES_DB: support_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_user -d support_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ----------------------------------------------------------
  # Mock API – data-serving layer (reads from Postgres)
  # ----------------------------------------------------------
  mock_api:
    build: ./mock_api
    environment:
      DATABASE_URL: "postgresql://support_user:support_pass@postgres:5432/support_ai"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # AI Backend – LLM orchestration (calls mock_api over HTTP)
  # ----------------------------------------------------------
  ai_backend:
    build: ./ai_backend
    env_file: .env
    environment:
      MOCK_API_URL: "http://mock_api:8001"
    ports:
      - "8000:8000"
    depends_on:
      - mock_api

  # ----------------------------------------------------------
  # Dashboard – Streamlit UI (calls ai_backend over HTTP)
  # ----------------------------------------------------------
  dashboard:
    build: ./dashboard
    environment:
      AI_BACKEND_URL: "http://ai_backend:8000"
    ports:
      - "8501:8501"
    depends_on:
      - ai_backend

volumes:
  pgdata:
